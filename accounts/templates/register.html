<!DOCTYPE html>
<html>
<head>
    <title>Hotel Register</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            width: 430px;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
            border: 1px solid #e5e7eb;
        }

        h2 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 30px;
            font-size: 28px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 9px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #b45309;
            box-shadow: 0 0 0 3px rgba(180, 83, 9, 0.12);
        }

        button {
            width: 100%;
            padding: 14px;
            background: #92400e;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background: #78350f;
        }

        p {
            text-align: center;
            color: #475569;
            margin-top: 20px;
        }

        a {
            color: #92400e;
            text-decoration: none;
            font-weight: bold;
        }

        .msg {
            color: #dc2626;
            text-align: center;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create Account</h2>

    {% for message in messages %}
        <p class="msg">{{ message }}</p>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password1" placeholder="Enter Password" required>
        <input type="password" name="password2" placeholder="Confirm Password" required>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>

</body>
</html>
